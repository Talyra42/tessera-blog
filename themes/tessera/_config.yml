# --------------------------------------
# Hexo Tessera 主题配置
# 使用文档：https://hexo-theme-tessera.vercel.app　|　仓库：https://github.com/LumiDesk/hexo-theme-tessera
# --------------------------------------

# --------------------------------------
# 导航栏设置
# --------------------------------------

nav:
  # 导航栏 Logo 图片
  logo: /img/tessera-logo.svg
  display_title: true
  display_post_title: true
  # 是否固定导航栏
  fixed: false

menu:
  # 首页: / || fas fa-home
  # 列表||fas fa-list:
  #   音乐: /music/ || fas fa-music
  #   电影: /movies/ || fas fa-video

# --------------------------------------
# 代码块设置
# --------------------------------------

code_blocks:
  # 代码块主题: darker / pale night / light / ocean / false
  theme: light
  macStyle: false
  # 代码块高度上限（单位: px）
  height_limit: false
  word_wrap: false

  # 工具栏
  copy: true
  language: true
  # true: 折叠代码块 | false: 展开代码块 | none: 展开代码块并隐藏折叠按钮
  shrink: false
  fullpage: false

# 社交媒体链接
# 格式:
#   图标: 链接 || 描述 || 颜色
social:
  # fab fa-github: https://github.com/xxxxx || Github || '#24292e'
  # fas fa-envelope: mailto:xxxxxx@gmail.com || Email || '#4a7dbe'

# --------------------------------------
# 图片设置
# --------------------------------------

favicon: /img/tessera-logo.svg

avatar:
  img: /img/tessera-logo.svg
  effect: false

# 页脚背景图（填图片路径，false 为不使用）
footer_img: false

# 网站背景
# 可设为颜色、图片 URL，或同时包含颜色 / 图片 URL 的数组
# 若提供数组，每次加载会从中随机选取一个背景
background:

cover:
  # 是否启用封面
  index_enable: true
  aside_enable: true
  archives_enable: true
  # 未设置封面时显示的默认封面
  default_cover:
    # - xxx.jpg
  # 随机封面目录（站点 source 下的相对路径，如 img/cover 对应 <博客根目录>/source/img/cover/）
  # 把图片丢进该目录即可：未设置 cover 的文章会从中随机取一张作为封面，优先级高于 default_cover
  random_cover_dir: img/cover

# 图片加载失败时的替换图
error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

# 简易 404 页面（默认开启，会生成 404.html）
error_404:
  enable: true
  subtitle: 'Page Not Found'
  background: /img/error-page.png

post_meta:
  # 首页文章卡片
  page:
    # 可选: created（发布）/ updated（更新）/ both（两者）
    date_type: created
    # 可选: date（日期）/ relative（相对时间）
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    # 可选: left（左对齐）/ center（居中）
    position: left
    # 可选: created / updated / both
    date_type: both
    # 可选: date / relative
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# 首页设置
# --------------------------------------

# 首页文章卡片布局
# 1: 封面在左，信息在右
# 2: 封面在右，信息在左
# 3: 封面左右交替
# 4: 封面在上，信息在下
# 5: 信息叠在封面上
# 6: 等高 CSS 网格 —— 封面在上、信息在下，同行卡片自动等高（默认）
# 7: 瀑布流（JS）—— 信息叠在封面上
index_layout: 6

# 首页是否显示文章简介
# 1: 使用 description
# 2: 两者（有 description 时显示 description，否则显示自动摘要）
# 3: 自动摘要（默认）
# false: 不显示文章简介
index_post_content:
  method: 3
  # method 为 2 或 3 时，需配置摘要截断长度
  length: 500

# --------------------------------------
# 文章设置
# --------------------------------------

toc:
  post: true
  page: false
  number: true
  expand: false
  # 仅对文章生效
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 赞赏 / 打赏
reward:
  enable: false
  text:
  QR_code:
    # - img: /img/wechat.jpg
    #   link:
    #   text: wechat
    # - img: /img/alipay.jpg
    #   link:
    #   text: alipay

# 文章在线编辑
# 方便在线浏览并编辑博客源码
post_edit:
  enable: false
  # url: https://github.com/user-name/repo-name/edit/branch-name/subdirectory-name/
  # 例如: https://github.com/Talyra42/blog/edit/main/source/
  url:

# 相关文章
related_post:
  enable: true
  # 显示数量
  limit: 6
  # 可选: created / updated
  date_type: created

# 可选: 1 / 2 / false
# 1: 「下一篇」指向更旧的文章
# 2: 「下一篇」指向更新的文章
# false: 关闭文章分页
post_pagination: 1

# 文章过期提醒
noticeOutdate:
  enable: false
  # 样式: simple / flat
  style: flat
  # 超过多少天显示提醒
  limit_day: 365
  # 位置: top（顶部）/ bottom（底部）
  position: top
  message_prev: It has been
  message_next: days since the last update, the content of the article may be outdated.

# --------------------------------------
# 页脚设置
# --------------------------------------
footer:
  nav:
  owner:
    enable: true
    since: 2025
  # 主题与框架的版权信息
  copyright:
    enable: true
    version: true
  custom_text:

# --------------------------------------
# 侧边栏设置
# --------------------------------------

aside:
  enable: true
  hide: false
  # 是否在右下角显示隐藏侧栏的按钮
  button: true
  mobile: true
  # 位置: left / right
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description:
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/xxxxxx
  card_announcement:
    enable: true
    content: This is my Blog
  card_recent_post:
    enable: true
    # 设为 0 显示全部
    limit: 5
    # 排序: date（发布）/ updated（更新）
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
    sort_order:
    limit: 6
    # 单位: 分钟，数据缓存到 localStorage
    storage: 10
    avatar: true
  card_categories:
    enable: true
    # 设为 0 显示全部
    limit: 8
    # 可选: none / true / false
    expand: none
    sort_order:
  card_tags:
    enable: true
    # 设为 0 显示全部
    limit: 40
    color: false
    custom_colors:
    # 标签排序依据: random / name / length
    orderby: random
    # 排序方向: 1 升序; -1 降序
    order: 1
    sort_order:
  card_archives:
    enable: true
    # 类型: monthly（按月）/ yearly（按年）
    type: monthly
    # 例如: YYYY年MM月
    format: MMMM YYYY
    # 排序方向: 1 升序; -1 降序
    order: -1
    # 设为 0 显示全部
    limit: 8
    sort_order:
  card_post_series:
    enable: true
    # 标题是否显示系列名
    series_title: false
    # 按标题或日期排序
    orderBy: 'date'
    # 排序方向: 1 升序; -1 降序
    order: -1
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:
    # 建站时间到现在的运行时长
    # 格式: 月/日/年 时间，或 年/月/日 时间
    # 不需要此功能则留空
    runtime_date:

# --------------------------------------
# 右下角按钮
# --------------------------------------

# 右下角按钮距离底部的距离（默认单位: px）
rightside_bottom:

# 简繁中文转换
translate:
  enable: false
  # 按钮文字
  default: 繁
  # 网站语言（1 - 繁体中文 / 2 - 简体中文）
  defaultEncoding: 2
  # 延迟时间
  translateDelay: 0
  # 当前为简体中文时，按钮显示的文字
  msgToTraditionalChinese: '繁'
  # 当前为繁体中文时，按钮显示的文字
  msgToSimplifiedChinese: '簡'

# 深色模式
darkmode:
  enable: true
  # 切换深 / 浅色模式的按钮
  button: true
  # 自动切换深 / 浅色模式
  # autoChangeMode: 1  跟随系统设置；若系统不支持深色模式，则在 18:00 - 6:00 之间切换为深色
  # autoChangeMode: 2  在 18:00 - 6:00 之间切换为深色
  # autoChangeMode: false
  autoChangeMode: false
  # 设置浅色模式的时间段，取值 0 ~ 24；不设置时默认为 6 和 18
  start:
  end:

# 在「返回顶部」按钮上显示滚动百分比
rightside_scroll_percent: false

# 不了解原理请勿修改以下设置
# 可选: translate,darkmode,hideAside,toc,chat,comment
# 同一个值不要重复
rightside_item_order:
  enable: false
  # 默认: translate,darkmode,hideAside
  hide:
  # 默认: toc,chat,comment
  show:

# 右下角配置按钮的动画
rightside_config_animation: true

# --------------------------------------
# 全局设置
# --------------------------------------

anchor:
  # 滚动时，URL 会根据标题 id 更新
  auto_update: false
  # 点击标题滚动并更新锚点
  click_to_scroll: false

photofigcaption: false

copy:
  enable: true
  # 在复制的内容后追加版权信息
  copyright:
    enable: false
    limit_count: 150

# 需要安装 hexo-wordcount 插件
wordcount:
  enable: false
  # 在文章元信息中显示字数
  post_wordcount: true
  # 在文章元信息中显示阅读时长
  min2read: true
  # 在侧栏「网站信息」卡中显示全站总字数
  total_wordcount: true

# 不蒜子 PV / UV 统计
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# 数学公式
# --------------------------------------

# 关于 per_page
# 设为 true 时，每个页面都会加载 mathjax/katex 脚本
# 设为 false 时，按需加载（在页面 front-matter 中添加 'mathjax: true' 或 'katex: true'）
math:
  # 可选: mathjax, katex
  # 不需要数学公式则留空
  use:
  per_page: true
  hide_scrollbar: false

  mathjax:
    # 启用右键上下文菜单
    enableMenu: true
    # 可选: all / ams / none，控制公式是否编号及编号方式
    tags: none

  katex:
    # 启用复制 KaTeX 公式
    copy_tex: false

# --------------------------------------
# 搜索
# --------------------------------------

search:
  # 可选: algolia_search / local_search / docsearch
  # 不需要搜索则留空
  use:
  placeholder:

  # Algolia 搜索
  algolia_search:
    # 每页搜索结果数量
    hitsPerPage: 6

  # 本地搜索
  local_search:
    # 页面加载时预载搜索数据
    preload: false
    # 每篇文章最多显示的结果数，设为 -1 显示全部
    top_n_per_article: 1
    # 反转义 HTML 字符串为可读形式
    unescape: false
    # 搜索结果启用分页
    pagination:
      enable: false
      # 每页搜索结果数量
      hitsPerPage: 8
    CDN:

  # Docsearch
  # https://docsearch.algolia.com/
  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# 分享系统
# --------------------------------------

share:
  # 可选: sharejs / addtoany
  # 不需要分享则留空
  use: sharejs

  # Share.js
  # https://github.com/overtrue/share.js
  sharejs:
    sites: facebook,x,wechat,weibo,qq

  # AddToAny
  # https://www.addtoany.com/
  addtoany:
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# 评论系统
# --------------------------------------

comments:
  # 最多可启用两套评论系统，第一套为默认显示
  # 不需要评论则留空
  # 可选: Disqus/Disqusjs/Livere/Gitalk/Valine/Waline/Utterances/Facebook Comments/Twikoo/Giscus/Remark42/Artalk
  # 两套评论系统的写法: Disqus,Waline
  use:
  # 在按钮旁显示评论系统名称
  text: true
  # 懒加载: 评论元素进入浏览器视口时才加载评论系统
  # 设为 true 后，评论计数将失效
  lazyload: false
  # 在文章顶部显示评论数
  count: false
  # 在首页卡片显示评论数
  card_post_count: false

# Disqus
# https://disqus.com/
disqus:
  shortname:
  # 用于「最新评论」组件
  apikey:

# Disqus 替代方案 —— 通过 Disqus API 渲染评论
# https://github.com/SukkaW/DisqusJS
disqusjs:
  shortname:
  apikey:
  option:

# Livere
# https://www.livere.com/
livere:
  uid:

# Gitalk
# https://github.com/gitalk/gitalk
gitalk:
  client_id:
  client_secret:
  repo:
  owner:
  admin:
  option:

# Valine
# https://valine.js.org
valine:
  appId:
  appKey:
  avatar: monsterid
  # 此配置适用于国内自定义域名用户，海外版会自动检测（无需手动填写）
  serverURLs:
  bg:
  # 用 Valine 访客数作为页面浏览量
  visitor: false
  option:

# Waline —— 基于 Valine 衍生、带后端支持的简洁评论系统
# https://waline.js.org/
waline:
  serverURL:
  bg:
  # 用 Waline 浏览量作为页面浏览量
  pageview: false
  option:

# Utterances
# https://utteranc.es/
utterances:
  repo:
  # Issue 映射方式: pathname/url/title/og:title
  issue_term: pathname
  # 主题: github-light/github-dark/github-dark-orange/icy-dark/dark-blue/photon-dark
  light_theme: github-light
  dark_theme: photon-dark
  js:
  option:

# Facebook 评论插件
# https://developers.facebook.com/docs/plugins/comments/
facebook_comments:
  app_id:
  # 可选
  user_id:
  pageSize: 10
  # 可选: social / time / reverse_time
  order_by: social
  lang: en_US

# Twikoo
# https://github.com/imaegoo/twikoo
twikoo:
  envId:
  region:
  # 用 Twikoo 访客数作为页面浏览量
  visitor: false
  option:

# Giscus
# https://giscus.app/
giscus:
  repo:
  repo_id:
  category_id:
  light_theme: light
  dark_theme: dark
  js:
  option:

# Remark42
# https://remark42.com/docs/configuration/frontend/
remark42:
  host:
  siteId:
  option:

# Artalk
# https://artalk.js.org/guide/frontend/config.html
artalk:
  server:
  site:
  # 用 Artalk 访客数作为页面浏览量
  visitor: false
  option:

# --------------------------------------
# 在线聊天服务
# --------------------------------------

chat:
  # 可选: chatra/tidio/crisp
  # 不需要聊天则留空
  use:
  # 聊天按钮 [推荐]
  # 会在网站右下角创建一个按钮，并隐藏原生按钮
  rightside_button: false
  # 上滑时显示原生聊天按钮，下滑时隐藏
  button_hide_show: false

# https://chatra.io/
chatra:
  id:

# https://www.tidio.com/
tidio:
  public_key:

# https://crisp.chat/en/
crisp:
  website_id:

# --------------------------------------
# 统计分析
# --------------------------------------

# https://tongji.baidu.com/web/welcome/login
baidu_analytics:

# https://analytics.google.com/analytics/web/
google_analytics:

# https://www.cloudflare.com/zh-tw/web-analytics/
cloudflare_analytics:

# https://clarity.microsoft.com/
microsoft_clarity:

# https://umami.is/
umami_analytics:
  enable: false
  # 自托管时，填写 Umami 实例的主机地址
  serverURL:
  script_name: script.js
  website_id:
  option:
  UV_PV:
    site_uv: false
    site_pv: false
    page_pv: false
    # Umami Cloud（API key）/ 自托管 Umami（token）
    token:

# https://www.googletagmanager.com/
google_tag_manager:
  tag_id:
  # 可选
  domain:

# --------------------------------------
# 广告
# --------------------------------------

# Google Adsense
google_adsense:
  enable: false
  auto_ads: true
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
  client:
  enable_page_level_ads: true

# 手动插入广告
# 不需要广告则留空
ad:
  # 在首页插入广告（每三篇文章一次）
  index:
  # 在侧栏插入广告
  aside:
  # 在文章中插入广告（分页之前）
  post:

# --------------------------------------
# 站长验证
# --------------------------------------

site_verification:
  # - name: google-site-verification
  #   content: xxxxxx
  # - name: baidu-site-verification
  #   content: xxxxxxx

# --------------------------------------
# 美化 / 特效
# --------------------------------------

# 自定义主题配色
# 注意: 颜色值必须用双引号包裹，如 "#000"，否则可能报错！

# theme_color:
#   enable: true
#   main: "#49B1F5"
#   paginator: "#00c4b6"
#   button_hover: "#FF7242"
#   text_selection: "#00c4b6"
#   link_color: "#99a9bf"
#   meta_color: "#858585"
#   hr_color: "#A4D8FA"
#   code_foreground: "#F47466"
#   code_background: "rgba(27, 31, 35, .05)"
#   toc_color: "#00c4b6"
#   blockquote_padding_color: "#49b1f5"
#   blockquote_background_color: "#49b1f5"
#   scrollbar_color: "#49b1f5"
#   meta_theme_color_light: "ffffff"
#   meta_theme_color_dark: "#0d0d0d"

# 分类页与标签页的界面样式
# 可选: index - 同首页样式 / default - 同归档页样式
# 留空或填 index
category_ui:
tag_ui:

# UI 元素使用圆角
rounded_corners_ui: true

# 正文两端对齐（每行等宽）
text_align_justify: false

# 为页头和页脚添加遮罩
mask:
  header: true
  footer: true

# 加载动画
preloader:
  enable: true
  # 来源
  # 1. fullpage-loading（全屏环形加载动画）
  # 2. pace（进度条）
  source: 1
  # pace 主题（见 https://codebyzach.github.io/pace/）
  pace_css_url:

# 页面切换过渡动画
enter_transitions: false

# 默认显示模式 - light（默认）/ dark
display_mode: light

# 美化文章正文的相关配置
beautify:
  enable: false
  # 指定美化范围（site 或 post）
  field: post
  # 指定作为标题前缀的图标，如 '\f0c1'
  title_prefix_icon:
  # 指定标题前缀图标的颜色，如 '#F47466'
  title_prefix_icon_color:

# 全局字体设置
# 不了解原理请勿修改以下设置
font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

# 站点标题与副标题的字体设置
blog_title_font:
  font_link:
  font_family:

# 分割线图标设置
hr_icon:
  enable: true
  # Font Awesome 图标的 unicode 值，如 '\3423'
  icon:
  icon_top:

# 打字机震动特效
# https://github.com/disjukr/activate-power-mode
activate_power_mode:
  enable: false
  colorful: true
  shake: true
  mobile: false

# 背景特效
# --------------------------------------

# Tessera 首页开屏模块（安知鱼风格 hero）
# 首页开屏模块：标语卡 + 滚动图标墙 + 分类入口 + 推荐位（仅首页第一页显示）
home_top:
  enable: true
  title: 生活明朗
  subTitle: 万物可爱。
  siteText: TESSERA
  # 图标墙：FontAwesome 图标 + 底色，奇偶项自动分成两行反向滚动
  icons:
    - icon: fab fa-js
      color: "#f0db4f"
    - icon: fab fa-react
      color: "#61dafb"
    - icon: fab fa-vuejs
      color: "#41b883"
    - icon: fab fa-node-js
      color: "#68a063"
    - icon: fab fa-html5
      color: "#e34f26"
    - icon: fab fa-css3-alt
      color: "#264de4"
    - icon: fab fa-python
      color: "#3776ab"
    - icon: fab fa-git-alt
      color: "#f05032"
    - icon: fab fa-docker
      color: "#2496ed"
    - icon: fab fa-linux
      color: "#333333"
    - icon: fab fa-github
      color: "#24292e"
    - icon: fab fa-npm
      color: "#cb3837"
    - icon: fab fa-java
      color: "#e76f00"
    - icon: fab fa-rust
      color: "#ce422b"
    - icon: fab fa-golang
      color: "#00add8"
    - icon: fab fa-php
      color: "#777bb4"
  # 分类入口：建议 2-3 个；color 支持渐变
  category:
    - name: 技术
      path: /categories/
      icon: fas fa-dove
      color: "linear-gradient(120deg, #425AEF, #7a8eff)"
    - name: 生活
      path: /categories/
      icon: fas fa-fire
      color: "linear-gradient(120deg, #f65c2c, #ff9a52)"
    - name: 随笔
      path: /categories/
      icon: fas fa-book
      color: "linear-gradient(120deg, #0fb6a5, #4cd9b0)"
  # 推荐位横幅：image 不填则使用主题色渐变兜底
  banner:
    enable: true
    tips: 主题
    title: Hexo Theme Tessera
    image:
    link: /
    button: 更多推荐

# Tessera 自定义右键菜单（安知鱼风格）
# 自定义右键菜单：导航/复制/随机文章/昼夜切换；选中文字、链接、图片有情境动作
# 按住 Ctrl 右键可呼出系统原生菜单
rightmenu:
  enable: true

# Tessera 3D 背景（主题视觉签名）
# 漂浮玻璃碎片场，基于 three.js；深浅色模式自适应，移动端默认关闭
bg_3d:
  enable: true
  mobile: false
  zIndex: -1
  # 整个画布的不透明度（0 ~ 1）
  opacity: 1

# canvas_ribbon 静态彩带
# 参见: https://github.com/hustcc/ribbon.js
canvas_ribbon:
  enable: false
  # 彩带尺寸
  size: 150
  # 彩带不透明度（0 ~ 1）
  alpha: 0.6
  zIndex: -1
  click_to_change: false
  mobile: false

# 飘动彩带
canvas_fluttering_ribbon:
  enable: false
  mobile: false

# canvas_nest 线条背景
# https://github.com/hustcc/canvas-nest.js
canvas_nest:
  enable: false
  # 线条颜色，默认 '0,0,0'；RGB 值: (R,G,B)（注意用 ',' 分隔）
  color: '0,0,255'
  # 线条不透明度（0~1）
  opacity: 0.7
  # 背景的 z-index
  zIndex: -1
  # 线条数量
  count: 99
  mobile: false

# 鼠标点击特效：烟花
fireworks:
  enable: false
  zIndex: 9999
  mobile: false

# 鼠标点击特效：爱心
click_heart:
  enable: false
  mobile: false

# 鼠标点击特效：文字
clickShowText:
  enable: false
  text:
    # - I
    # - LOVE
    # - YOU
  fontSize: 15px
  random: false
  mobile: false

# --------------------------------------
# 图片灯箱设置
# --------------------------------------

# 可选: fancybox / medium_zoom
# https://github.com/francoischalifour/medium-zoom
# https://fancyapps.com/fancybox/
# 不需要灯箱则留空
lightbox:

# --------------------------------------
# 标签插件设置
# --------------------------------------

# 系列文章
series:
  enable: false
  # 按标题或日期排序
  orderBy: 'title'
  # 排序方向: 1 升序; -1 降序
  order: 1
  number: true

# ABCJS —— ABC 乐谱记谱插件
# https://github.com/paulrosen/abcjs
abcjs:
  enable: false
  per_page: true

# Mermaid 流程图
# https://github.com/mermaid-js/mermaid
mermaid:
  enable: false
  # 允许用代码块书写 Mermaid 图
  code_write: false
  # 内置主题: default / forest / dark / neutral
  theme:
    light: default
    dark: dark
  # 启用「在新标签页打开」按钮，在独立窗口查看图表
  open_in_new_tab: true
  # 启用图表的缩放与平移交互
  zoom_pan: true

# chartjs 图表
# 参见 https://www.chartjs.org/docs/latest/
chartjs:
  enable: false
  # 不了解原理请勿修改
  # 以下默认设置仅在 MD 语法未指定时生效
  # 图表的通用字体颜色
  fontColor:
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'
  # 图表的通用边框颜色
  borderColor:
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'
  # 雷达图与极区图刻度标签的背景色
  scale_ticks_backdropColor:
    light: 'transparent'
    dark: 'transparent'

# note —— Bootstrap Callout 提示框
note:
  # note 标签样式可选值:
  #  - simple    bs-callout 旧版警告样式（默认）
  #  - modern    bs-callout 新版（v2-v3）警告样式
  #  - flat      带背景的扁平样式，类似 Mozilla 或 StackOverflow
  #  - disabled  禁用 note 标签的全部 CSS 样式导入
  style: flat
  icons: true
  border_radius: 3
  # modern 与 flat 样式下背景的明度偏移（%）（modern: -12 | 12; flat: -18 | 6）
  # 该偏移同样作用于 label 标签变量。即使禁用 note 标签也可生效
  light_bg_offset: 0

# --------------------------------------
# 其它设置
# --------------------------------------

# https://github.com/MoOx/pjax
# 默认开启：跳页时只替换正文、不整页重载，页面切换更流畅且背景不重绘
pjax:
  enable: true
  # 排除不走 pjax 的页面，如 '/music/'
  exclude:
    # - /xxxxxx/

# 注入 css 与脚本（aplayer/meting 音乐播放器）
aplayerInject:
  enable: false
  per_page: true

# Snackbar —— Toast 提示
# https://github.com/polonel/SnackBar
# position: top-left / top-center / top-right / bottom-left / bottom-center / bottom-right
snackbar:
  enable: false
  position: bottom-left
  # 浅色 / 深色模式下 Toast 提示的背景色
  bg_light: '#49b1f5'
  bg_dark: '#1f1f1f'

# Instant.page 页面预加载
# https://instant.page/
instantpage: false

# 图片懒加载
# https://github.com/verlok/vanilla-lazyload
lazyload:
  enable: true
  # 使用浏览器原生懒加载替代 vanilla-lazyload
  native: false
  # 指定懒加载范围（site 或 post）
  field: site
  placeholder:
  blur: true

# PWA 渐进式网页应用
# 参见 https://github.com/JLHwung/hexo-offline
# ---------------
pwa:
  enable: false
  manifest:
  apple_touch_icon:
  favicon_32_32:
  favicon_16_16:
  mask_icon:

# Open Graph meta 标签
# https://hexo.io/docs/helpers#open-graph
Open_Graph_meta:
  enable: true
  option:
    # twitter_card:
    # twitter_image:
    # twitter_id:
    # twitter_site:
    # google_plus:
    # fb_admins:
    # fb_app_id:

# 结构化数据
# https://developers.google.com/search/docs/guides/intro-structured-data
structured_data:
  enable: false
  # 站点别名，用于结构化数据
  # 格式: ['name1', 'name2']
  alternate_name:

# 添加浏览器厂商前缀以确保兼容性
css_prefix: true

# 注入自定义代码
# 在 '</head>' 之前和 '</body>' 之前插入代码
inject:
  head:
    # - <link rel="stylesheet" href="/xxx.css">
  bottom:
    # - <script src="xxxx"></script>

# CDN 设置
# 不了解原理请勿修改以下设置
CDN:
  # 内部脚本与第三方脚本的 CDN 提供商
  # 两者可选: local/jsdelivr/unpkg/cdnjs/custom
  # 注意: 开发版的内部脚本只能用 'local'
  # 注意: 第三方脚本设为 'local' 时，需安装 hexo-butterfly-extjs
  internal_provider: local
  third_party_provider: jsdelivr

  # 是否在 URL 中附加版本号，true 或 false
  version: true

  # 自定义格式
  # 例如: https://cdn.staticfile.org/${cdnjs_name}/${version}/${min_cdnjs_file}
  custom_format:

