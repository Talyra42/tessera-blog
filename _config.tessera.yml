# --------------------------------------
# Tessera 主题 · 个性化覆盖配置
# 这里的设置会自动覆盖 themes/tessera/_config.yml 中的同名项，
# 升级主题时无需改动主题目录。仅写需要自定义的项即可。
# --------------------------------------

# 站长验证（Bing / Google / 百度等）
site_verification:
  - name: msvalidate.01
    content: 18B08FBE5E43C5EF3DCC926E898EA158
  - name: google-site-verification
    content: DXj_GmbTGxwWyYGPtu3zlujWiGuiPKp1ZPWd9pUhW1o

# 导航菜单
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  关于: /about/ || fas fa-user

# 社交链接（图标: 链接 || 描述 || 颜色）
social:
  fab fa-github: https://github.com/Talyra42 || Github || '#24292e'
  fas fa-envelope: mailto:talyra42@foxmail.com || Email || '#4a7dbe'

# 文章版权信息
post_copyright:
  enable: true
  author_href: https://github.com/Talyra42
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 页脚
footer:
  owner:
    enable: true
    since: 2026
  copyright:
    enable: true
    version: true

# 侧栏
aside:
  card_author:
    enable: true
    description: 欢迎来到 Tessera —— Talyra42 的个人博客
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/Talyra42
  card_announcement:
    enable: true
    content: 这里记录我的学习与思考，欢迎常来逛逛 ✨

# 分享功能：留空即关闭，文章底部不显示任何分享方式
share:
  use:

# 本地搜索（依赖 hexo-generator-searchdb）
search:
  use: local_search
  local_search:
    preload: false
    top_n_per_article: 1

# 字数统计 / 阅读时长（依赖 hexo-wordcount）
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# Pjax：跳页时只替换正文、不整页重载，避免背景重绘卡顿
pjax:
  enable: true
  exclude:

# 封面（新版主题新增项）
# random_cover_dir：未设置 cover 的文章从该目录随机取封面，目录相对站点 source/
cover:
  random_cover_dir: cover

# 首页开屏模块 home_top（新版主题新增项）
# 标语卡 + 滚动图标墙 + 分类入口 + 推荐位，仅首页第一页显示。
# icons / category 为数组，覆盖时整组替换（不会与主题默认合并），需写全。
home_top:
  enable: true
  title: 只要想念
  subTitle: 就会相见。
  siteText: TALYRA42
  # 图标墙：奇偶项自动分两行反向滚动
  icons:
    - icon: fab fa-js
      color: "#f0db4f"
    - icon: fab fa-react
      color: "#61dafb"
    - icon: fab fa-vuejs
      color: "#41b883"
    - icon: fab fa-node-js
      color: "#68a063"
    - icon: fab fa-html5
      color: "#e34f26"
    - icon: fab fa-css3-alt
      color: "#264de4"
    - icon: fab fa-python
      color: "#3776ab"
    - icon: fab fa-git-alt
      color: "#f05032"
    - icon: fab fa-docker
      color: "#2496ed"
    - icon: fab fa-linux
      color: "#333333"
    - icon: fab fa-github
      color: "#24292e"
    - icon: fab fa-npm
      color: "#cb3837"
    - icon: fab fa-java
      color: "#e76f00"
    - icon: fab fa-rust
      color: "#ce422b"
    - icon: fab fa-golang
      color: "#00add8"
    - icon: fab fa-php
      color: "#777bb4"
  # 分类入口：建议 2-3 个，color 支持渐变
  category:
    - name: Linux
      path: /categories/linux/
      icon: fas fa-dove
      color: "linear-gradient(120deg, #425AEF, #7a8eff)"
    - name: 前端
      path: /categories/frontend/
      icon: fas fa-fire
      color: "linear-gradient(120deg, #f65c2c, #ff9a52)"
    - name: 后端
      path: /categories/backend/
      icon: fas fa-book
      color: "linear-gradient(120deg, #0fb6a5, #4cd9b0)"
  # 推荐位横幅：image 留空则用主题色渐变兜底
  banner:
    enable: true
    tips: 主题
    title: Hexo Theme Tessera
    image:
    link: https://github.com/LumiDesk/hexo-theme-tessera
    button: 了解一下
